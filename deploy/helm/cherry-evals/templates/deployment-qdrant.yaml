{{- if .Values.qdrant.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cherry-evals.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cherry-evals.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "cherry-evals.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "cherry-evals.qdrant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cherry-evals.qdrant.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.port }}
              protocol: TCP
            - name: grpc
              containerPort: 6334
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: {{ include "cherry-evals.fullname" . }}-qdrant-data
{{- end }}
