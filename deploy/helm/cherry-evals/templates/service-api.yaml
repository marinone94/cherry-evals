apiVersion: v1
kind: Service
metadata:
  name: {{ include "cherry-evals.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cherry-evals.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "cherry-evals.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
