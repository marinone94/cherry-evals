apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cherry-evals.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cherry-evals.labels" . | nindent 4 }}
data:
  CHERRY_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LANGFUSE_BASE_URL: {{ .Values.config.langfuseBaseUrl | quote }}
  QDRANT_URL: {{ include "cherry-evals.qdrantUrl" . | quote }}

  {{- /* Enterprise collective intelligence */}}
  {{- if and .Values.enterprise.enabled .Values.enterprise.collectiveIntelligence.enabled }}
  CHERRY_COLLECTIVE_INTELLIGENCE_ENABLED: "true"
  CHERRY_COLLECTIVE_INTELLIGENCE_ENDPOINT: {{ .Values.enterprise.collectiveIntelligence.endpoint | quote }}
  {{- else }}
  CHERRY_COLLECTIVE_INTELLIGENCE_ENABLED: "false"
  {{- end }}
