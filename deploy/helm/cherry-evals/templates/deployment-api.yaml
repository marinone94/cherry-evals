apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cherry-evals.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cherry-evals.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cherry-evals.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cherry-evals.api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cherry-evals.serviceAccountName" . }}

      {{- /* Wait for Postgres and Qdrant to be ready before starting */}}
      initContainers:
        {{- if .Values.postgres.enabled }}
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "cherry-evals.postgresHost" . }} {{ .Values.postgres.port }}; do
                echo "Waiting for postgres..."
                sleep 2
              done
              echo "Postgres is ready."
        {{- end }}
        {{- if .Values.qdrant.enabled }}
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "cherry-evals.fullname" . }}-qdrant {{ .Values.qdrant.port }}; do
                echo "Waiting for qdrant..."
                sleep 2
              done
              echo "Qdrant is ready."
        {{- end }}
        - name: run-migrations
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - alembic
            - upgrade
            - head
          env:
            - name: DATABASE_URL
              {{- if and (not .Values.postgres.enabled) .Values.externalPostgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalPostgres.existingSecret }}
                  key: DATABASE_URL
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: DATABASE_URL
              {{- end }}

      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

          envFrom:
            - configMapRef:
                name: {{ include "cherry-evals.configMapName" . }}

          env:
            {{- /* DATABASE_URL — from the chart secret or an existing external secret */}}
            - name: DATABASE_URL
              {{- if and (not .Values.postgres.enabled) .Values.externalPostgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalPostgres.existingSecret }}
                  key: DATABASE_URL
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: DATABASE_URL
              {{- end }}

            {{- /* LLM provider API keys */}}
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: GOOGLE_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: ANTHROPIC_API_KEY
            - name: CEREBRAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: CEREBRAS_API_KEY

            {{- /* Langfuse tracing */}}
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: LANGFUSE_SECRET_KEY

            {{- /* Auth (Supabase) */}}
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: SUPABASE_URL
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: SUPABASE_JWT_SECRET
            - name: AUTH_ENABLED
              value: {{ .Values.config.authEnabled | quote }}

            {{- /* Billing (Polar.sh) */}}
            - name: POLAR_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: POLAR_WEBHOOK_SECRET
            - name: POLAR_PRO_PRODUCT_ID
              value: {{ .Values.config.polarProProductId | quote }}
            - name: POLAR_ULTRA_PRODUCT_ID
              value: {{ .Values.config.polarUltraProductId | quote }}

            {{- /* CORS */}}
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}

            {{- /* Qdrant auth */}}
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: QDRANT_API_KEY

            {{- /* Enterprise license key */}}
            {{- if .Values.enterprise.enabled }}
            - name: ENTERPRISE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cherry-evals.secretName" . }}
                  key: ENTERPRISE_LICENSE_KEY
            {{- end }}
