{{- if .Values.qdrant.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cherry-evals.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cherry-evals.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  selector:
    {{- include "cherry-evals.qdrant.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.qdrant.port }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: grpc
      protocol: TCP
{{- end }}
