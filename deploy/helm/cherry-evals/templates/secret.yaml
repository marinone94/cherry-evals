{{- $useInternalPg := .Values.postgres.enabled -}}
{{- $useExternalSecret := and (not $useInternalPg) .Values.externalPostgres.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cherry-evals.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cherry-evals.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Database URL — only embed when not delegating to an existing secret */}}
  {{- if not $useExternalSecret }}
  DATABASE_URL: {{ include "cherry-evals.databaseUrl" . | quote }}
  {{- end }}

  {{- /* LLM provider API keys */}}
  GOOGLE_API_KEY: {{ .Values.config.googleApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.config.anthropicApiKey | quote }}
  CEREBRAS_API_KEY: {{ .Values.config.cerebrasApiKey | quote }}

  {{- /* Langfuse tracing */}}
  LANGFUSE_PUBLIC_KEY: {{ .Values.config.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.config.langfuseSecretKey | quote }}

  {{- /* Internal Postgres password (used by the Postgres StatefulSet) */}}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  {{- end }}

  {{- /* Auth (Supabase) */}}
  SUPABASE_URL: {{ .Values.config.supabaseUrl | quote }}
  SUPABASE_JWT_SECRET: {{ .Values.config.supabaseJwtSecret | quote }}

  {{- /* Billing (Polar.sh) */}}
  POLAR_WEBHOOK_SECRET: {{ .Values.config.polarWebhookSecret | quote }}

  {{- /* Qdrant auth */}}
  QDRANT_API_KEY: {{ .Values.config.qdrantApiKey | quote }}

  {{- /* Enterprise license */}}
  {{- if .Values.enterprise.enabled }}
  ENTERPRISE_LICENSE_KEY: {{ .Values.enterprise.licenseKey | quote }}
  {{- end }}
